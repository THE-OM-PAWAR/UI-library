name: CI/CD Pipeline

on:
    push:
        branches:
            - "**"
    pull_request:
        branches:
            - "**"

jobs:
    lint-and-build:
        name: Lint, Check, and Build
        runs-on: ubuntu-latest

        env:
            NODE_ENV: production
            PORT: "3000"

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v1
              with:
                  bun-version: latest

            - name: Cache Bun Dependencies
              uses: actions/cache@v3
              with:
                  path: |
                      ~/.bun/install/cache
                      node_modules
                  key: bun-${{ runner.os }}-${{ hashFiles('bun.lockb') }}
                  restore-keys: bun-${{ runner.os }}-

            - name: Install Dependencies
              run: bun install

            - name: Check Formatting
              run: bun check

            - name: Format Code
              run: bun format

            - name: Lint Code
              run: bun lint

            - name: Run Build
              run: bun run build
